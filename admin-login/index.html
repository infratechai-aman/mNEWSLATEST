<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Admin login interface for CMS." />
  <title>Admin Login | Maithili News</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700;900&family=Source+Sans+3:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/styles.css" />
</head>
<body>
  <div id="site-shell"></div>
  <main class="page-main">
    <div class="container">
<section class="login-wrap">
  <div class="surface login-card">
    <h1 class="headline-lg">Admin Login</h1>
    <p class="muted">Frontend-only UI for newsroom CMS access.</p>
    <input type="email" placeholder="Admin email" />
    <input type="password" placeholder="Password" style="margin-top:0.6rem;" />
    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:0.8rem;">
      <label><input type="checkbox" /> Remember me</label>
      <a href="#" class="muted">Forgot password?</a>
    </div>
    <button class="primary" type="button" style="margin-top:0.8rem; width:100%;">Sign In</button>
    <div class="action-row" style="margin-top:0.8rem;">
      <a class="btn-secondary" href="/admin-panel/">Open Admin Panel</a>
      <a class="btn-secondary" href="/reporter-panel/">Open Reporter Panel</a>
    </div>
  </div>
</section>
    </div>
  </main>
  <div id="site-footer"></div>
  <script src="/assets/js/firebase-db.js" defer></script>
  <script src="/assets/js/app.js" defer></script>
  
</body>
</html>
