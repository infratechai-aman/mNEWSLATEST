<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Contact Maithili News." />
  <title>Contact | Maithili News</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700;900&family=Source+Sans+3:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/styles.css" />
  <link rel="icon" href="/assets/img/maithili_logo.png" type="image/png">
</head>
<body>
  <div id="site-shell"></div>
  <main class="page-main">
    <div class="container">
<section class="page-header"><h1 class="headline-xl" style="margin:0;">Contact</h1><p style="margin:0.4rem 0 0; opacity:0.9;">Reach our newsroom, editorial desk, and business team.</p></section>
<section class="split" style="margin-top:1rem;">
  <div class="surface story-content">
    <h2 class="headline-lg">Send a Message</h2>
    <input type="text" placeholder="Full name" />
    <input type="email" placeholder="Email" style="margin-top:0.6rem;" />
    <input type="text" placeholder="Subject" style="margin-top:0.6rem;" />
    <textarea rows="5" placeholder="Your message" style="margin-top:0.6rem;"></textarea>
    <button class="primary" type="button" style="margin-top:0.7rem;">Submit</button>
  </div>
  <aside class="grid">
    <div class="sidebar-widget">
      <h3 class="headline-md">Newsroom</h3>
      <p class="muted">Fraser Road, Patna, Bihar</p>
      <p class="muted">newsroom@maithilinews.example</p>
      <p class="muted">+91 00000 00000</p>
    </div>
    <div class="ad-slot">Sidebar Ad</div>
  </aside>
</section>
    </div>
  </main>
  <div id="site-footer"></div>
  <script src="/assets/js/firebase-db.js" defer></script>
  <script src="/assets/js/app.js" defer></script>
  
</body>
</html>
